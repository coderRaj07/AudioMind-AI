services:

  db:
    image: postgres:15
    restart: always

    environment:
      POSTGRES_DB: voice_rag
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d voice_rag"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    restart: always

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data

  temporal:
    image: temporalio/auto-setup:1.25
    restart: always

    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: user
      POSTGRES_PWD: password
      POSTGRES_SEEDS: db

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.21.3
    restart: always

    environment:
      TEMPORAL_ADDRESS: temporal:7233

    depends_on:
      - temporal

    ports:
      - "8080:8080"

volumes:
  postgres_data:
  minio_data: