version: "3.9"

services:
  app:
    build: ..
    ports:
      - "8000:8000"
    env_file:
      - ../.env

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: voice_rag
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  minio:
    image: minio/minio
    command: server /data
    environment:
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
    ports:
      - "9000:9000"

  temporal:
    image: temporalio/auto-setup
    ports:
      - "7233:7233"